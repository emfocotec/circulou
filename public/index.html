<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CírculoU - Entrar</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap');

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #0d0d12;
  --card: #16161f;
  --border: rgba(255,255,255,0.07);
  --accent: #c084fc;
  --accent2: #818cf8;
  --text: #f4f4f5;
  --muted: #71717a;
  --danger: #f87171;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
}

/* fundo com malha de gradiente */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 20%, rgba(192,132,252,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 80% 80%, rgba(129,140,248,0.10) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 48px 40px;
  width: 380px;
  max-width: 95vw;
  box-shadow: 0 40px 80px rgba(0,0,0,0.5);
  animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
  opacity: 0;
  transform: translateY(30px);
}

@keyframes fadeUp {
  to { opacity:1; transform:translateY(0); }
}

.logo {
  font-family: 'DM Serif Display', serif;
  font-size: 2rem;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-align: center;
  margin-bottom: 8px;
}

.tagline {
  text-align: center;
  color: var(--muted);
  font-size: 0.875rem;
  margin-bottom: 36px;
}

.field {
  margin-bottom: 16px;
}

label {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

input {
  width: 100%;
  padding: 14px 18px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(192,132,252,0.15);
}

input::placeholder { color: #3f3f46; }

button[type="submit"] {
  width: 100%;
  padding: 15px;
  margin-top: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  border: none;
  border-radius: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
}

button[type="submit"]:hover { opacity: 0.9; }
button[type="submit"]:active { transform: scale(0.98); }
button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 24px 0;
}

.divider span {
  flex: 1;
  height: 1px;
  background: var(--border);
}

.divider p {
  font-size: 0.8rem;
  color: var(--muted);
}

.register-link {
  text-align: center;
  font-size: 0.9rem;
  color: var(--muted);
}

.register-link a {
  color: var(--accent);
  text-decoration: none;
  font-weight: 600;
  cursor: pointer;
}

.register-link a:hover { text-decoration: underline; }

#errorMsg {
  color: var(--danger);
  font-size: 0.85rem;
  text-align: center;
  margin-top: 12px;
  min-height: 20px;
}
</style>
</head>
<body>
<div class="container">
  <p class="logo">CírculoU</p>
  <p class="tagline">Conecte-se com quem tem os mesmos objetivos</p>

  <form id="loginForm" novalidate>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="seu@email.com" required autocomplete="email">
    </div>
    <div class="field">
      <label for="password">Senha</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" id="submitBtn">Entrar</button>
    <p id="errorMsg"></p>
  </form>

  <div class="divider"><span></span><p>ou</p><span></span></div>

  <p class="register-link">Não tem conta? <a href="/register.html">Cadastre-se</a></p>
</div>

<script>
  const form = document.getElementById('loginForm');
  const submitBtn = document.getElementById('submitBtn');
  const errorMsg = document.getElementById('errorMsg');

  // Se já estiver logado, redireciona
  if (localStorage.getItem('token')) {
    window.location.href = '/matches.html';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.textContent = '';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Entrando...';

    const email = form.email.value.trim();
    const password = form.password.value;

    if (!email || !password) {
      errorMsg.textContent = 'Preencha todos os campos.';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Entrar';
      return;
    }

    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('userId', data.userId);
        window.location.href = '/matches.html';
      } else {
        errorMsg.textContent = data.message || 'Erro ao fazer login.';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Entrar';
      }
    } catch (err) {
      errorMsg.textContent = 'Erro de conexão. Tente novamente.';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Entrar';
    }
  });
</script>
</body>
</html>
