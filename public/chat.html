<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CírculoU - Chats</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap');

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #0d0d12;
  --card: #16161f;
  --card2: #1e1e2a;
  --border: rgba(255,255,255,0.07);
  --accent: #c084fc;
  --accent2: #818cf8;
  --text: #f4f4f5;
  --muted: #71717a;
  --danger: #f87171;
  --bubble-me: linear-gradient(135deg, #7c3aed, #9333ea);
  --bubble-them: #1e1e2a;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  color: var(--text);
}

body::before {
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 50% 40% at 10% 10%, rgba(192,132,252,0.08) 0%, transparent 55%),
    radial-gradient(ellipse 40% 50% at 90% 90%, rgba(129,140,248,0.06) 0%, transparent 55%);
  pointer-events:none;
  z-index:0;
}

/* ===== LAYOUT ===== */
.app {
  position: relative;
  z-index: 1;
  display: flex;
  height: 100dvh;
  max-width: 900px;
  margin: 0 auto;
  width: 100%;
}

/* ===== SIDEBAR (lista de matches) ===== */
.sidebar {
  width: 300px;
  min-width: 300px;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

.sidebar-header {
  padding: 20px 16px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.sidebar-logo {
  font-family: 'DM Serif Display', serif;
  font-size: 1.3rem;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.icon-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, color 0.2s;
  flex-shrink: 0;
}

.icon-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }

.match-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.match-list::-webkit-scrollbar { width: 4px; }
.match-list::-webkit-scrollbar-track { background: transparent; }
.match-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.match-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  cursor: pointer;
  border-radius: 12px;
  margin: 2px 8px;
  transition: background 0.15s;
  position: relative;
}

.match-item:hover { background: rgba(255,255,255,0.04); }
.match-item.active { background: rgba(192,132,252,0.1); }

.match-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  object-fit: cover;
  background: #1e1b30;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  border: 2px solid transparent;
}

.match-item.active .match-avatar { border-color: var(--accent); }

.match-info { flex: 1; min-width: 0; }

.match-name {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.match-preview {
  font-size: 0.78rem;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 2px;
}

.unread-badge {
  background: var(--accent);
  color: #fff;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 50px;
  flex-shrink: 0;
}

.no-matches {
  padding: 40px 20px;
  text-align: center;
  color: var(--muted);
  font-size: 0.875rem;
  line-height: 1.6;
}

.no-matches .icon { font-size: 2rem; margin-bottom: 10px; opacity: 0.4; }

/* ===== CHAT AREA ===== */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100dvh;
  min-width: 0;
}

.chat-placeholder {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--muted);
}

.chat-placeholder .icon { font-size: 3rem; opacity: 0.2; }
.chat-placeholder p { font-size: 0.9rem; }

/* Chat header */
.chat-header {
  display: none;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.chat-header.show { display: flex; }

.chat-header-avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  object-fit: cover;
  background: #1e1b30;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
}

.chat-header-name {
  font-weight: 600;
  font-size: 0.95rem;
  flex: 1;
}

.delete-btn {
  background: none;
  border: 1px solid rgba(248,113,113,0.3);
  color: var(--danger);
  font-size: 0.78rem;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 50px;
  cursor: pointer;
  transition: background 0.2s;
  font-family: 'DM Sans', sans-serif;
  white-space: nowrap;
}

.delete-btn:hover { background: rgba(248,113,113,0.1); }

/* Messages */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 20px 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  animation: msgIn 0.2s ease;
}

@keyframes msgIn {
  from { opacity:0; transform: translateY(8px); }
  to { opacity:1; transform: translateY(0); }
}

.msg-row.me { flex-direction: row-reverse; }

.msg-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  background: #1e1b30;
  font-size: 0.8rem;
  display: flex;
  align-items: center;
  justify-content: center;
}

.bubble {
  max-width: 65%;
  padding: 10px 14px;
  border-radius: 18px;
  font-size: 0.9rem;
  line-height: 1.5;
  word-break: break-word;
}

.msg-row.me .bubble {
  background: var(--bubble-me);
  color: #fff;
  border-bottom-right-radius: 4px;
}

.msg-row.them .bubble {
  background: var(--bubble-them);
  color: var(--text);
  border-bottom-left-radius: 4px;
}

.msg-time {
  font-size: 0.68rem;
  color: var(--muted);
  margin-top: 2px;
  text-align: right;
}

.msg-row.them .msg-time { text-align: left; }

.msg-date-divider {
  text-align: center;
  font-size: 0.72rem;
  color: var(--muted);
  margin: 8px 0;
  position: relative;
}

.msg-date-divider::before, .msg-date-divider::after {
  content:"";
  position: absolute;
  top: 50%;
  width: 35%;
  height: 1px;
  background: var(--border);
}

.msg-date-divider::before { left: 0; }
.msg-date-divider::after { right: 0; }

/* Input area */
.chat-input-area {
  display: none;
  padding: 12px 20px 16px;
  border-top: 1px solid var(--border);
  gap: 10px;
  align-items: flex-end;
  flex-shrink: 0;
}

.chat-input-area.show { display: flex; }

#msgInput {
  flex: 1;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 12px 18px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  outline: none;
  resize: none;
  max-height: 120px;
  overflow-y: auto;
  transition: border-color 0.2s;
  line-height: 1.4;
}

#msgInput:focus { border-color: var(--accent); }
#msgInput::placeholder { color: #3f3f46; }

.send-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.2s, transform 0.15s;
}

.send-btn:hover { opacity: 0.85; }
.send-btn:active { transform: scale(0.93); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Delete confirm modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 999;
  align-items: center;
  justify-content: center;
}

.modal-overlay.show { display: flex; }

.modal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px 28px;
  max-width: 320px;
  width: 90%;
  text-align: center;
  animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1) forwards;
  opacity: 0;
  transform: scale(0.8);
}

@keyframes popIn { to { opacity:1; transform:scale(1); } }

.modal-icon { font-size: 2rem; margin-bottom: 12px; }
.modal h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
.modal p { font-size: 0.875rem; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }

.modal-actions { display: flex; gap: 10px; }

.modal-actions button {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.875rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}

.btn-cancel { background: var(--card2); color: var(--muted); border: 1px solid var(--border) !important; }
.btn-cancel:hover { color: var(--text); }
.btn-confirm-delete { background: var(--danger); color: #fff; }
.btn-confirm-delete:hover { opacity: 0.85; }

/* Notification toast */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 20px;
  font-size: 0.85rem;
  color: var(--text);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  opacity: 0;
  transition: all 0.3s ease;
  z-index: 998;
  pointer-events: none;
  white-space: nowrap;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Mobile: esconde sidebar quando conversa aberta */
@media (max-width: 600px) {
  .sidebar { width: 100%; min-width: 100%; }
  .app.chat-open .sidebar { display: none; }
  .app.chat-open .chat-area { display: flex; }
  .chat-area { display: none; }
  .chat-header .back-mobile {
    display: flex !important;
  }
}

.back-mobile {
  display: none;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 1rem;
  cursor: pointer;
  align-items: center;
  justify-content: center;
}
</style>
</head>
<body>

<div class="app" id="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">Chats</span>
      <div style="display:flex;gap:6px;">
        <button class="icon-btn" id="matchesBtn" title="Ver matches">🔥</button>
        <button class="icon-btn" id="logoutBtn" title="Sair">🚪</button>
      </div>
    </div>
    <div class="match-list" id="matchList">
      <div class="no-matches">
        <div class="icon">💬</div>
        <p>Carregando seus matches...</p>
      </div>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area">

    <!-- Placeholder quando nenhuma conversa selecionada -->
    <div class="chat-placeholder" id="chatPlaceholder">
      <div class="icon">💬</div>
      <p>Selecione um match para conversar</p>
    </div>

    <!-- Header da conversa -->
    <div class="chat-header" id="chatHeader">
      <button class="back-mobile" id="backMobile">←</button>
      <div class="chat-header-avatar" id="chatHeaderAvatar">👤</div>
      <span class="chat-header-name" id="chatHeaderName"></span>
      <button class="delete-btn" id="deleteBtn">🗑 Excluir chat</button>
    </div>

    <!-- Mensagens -->
    <div class="messages" id="messagesContainer"></div>

    <!-- Input -->
    <div class="chat-input-area" id="chatInputArea">
      <textarea id="msgInput" placeholder="Mensagem..." rows="1" maxlength="1000"></textarea>
      <button class="send-btn" id="sendBtn">➤</button>
    </div>

  </div>
</div>

<!-- Modal de confirmação de exclusão -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <div class="modal-icon">🗑️</div>
    <h3>Excluir conversa?</h3>
    <p>Todas as mensagens serão apagadas para os dois. Essa ação não pode ser desfeita.</p>
    <div class="modal-actions">
      <button class="btn-cancel" id="cancelDelete">Cancelar</button>
      <button class="btn-confirm-delete" id="confirmDelete">Excluir para os dois</button>
    </div>
  </div>
</div>

<!-- Toast de notificação -->
<div class="toast" id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
  // ===== AUTH GUARD =====
  const token = localStorage.getItem('token');
  const userId = localStorage.getItem('userId');
  if (!token || !userId) window.location.href = '/index.html';

  const authHeaders = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };

  // ===== STATE =====
  let currentChatUserId = null;
  let currentChatName = null;
  let currentChatPhoto = null;
  let myPhoto = null;

  // ===== SOCKET =====
  const socket = io({ auth: { token } });

  socket.on('connect_error', (err) => {
    if (err.message === 'Token inválido') {
      localStorage.removeItem('token');
      localStorage.removeItem('userId');
      window.location.href = '/index.html';
    }
  });

  socket.on('new_message', (msg) => {
    if (msg.senderId !== userId && msg.senderId !== currentChatUserId) return;
    if (msg.senderId === currentChatUserId || msg.receiverId === currentChatUserId) {
      appendMessage(msg, msg.senderId === userId);
      scrollToBottom();
    }
  });

  socket.on('message_notification', ({ from, fromName, text }) => {
    if (from !== currentChatUserId) {
      showToast(`💬 ${fromName}: ${text.slice(0, 40)}${text.length > 40 ? '...' : ''}`);
      loadMatchList(); // atualiza preview
    }
  });

  socket.on('conversation_deleted', ({ by }) => {
    showToast('🗑 O outro usuário excluiu o chat.');
    if (currentChatUserId === by) {
      closeChat();
    }
    loadMatchList();
  });

  // ===== NAVEGAÇÃO =====
  document.getElementById('matchesBtn').addEventListener('click', () => {
    window.location.href = '/matches.html';
  });

  document.getElementById('logoutBtn').addEventListener('click', () => {
    localStorage.removeItem('token');
    localStorage.removeItem('userId');
    window.location.href = '/index.html';
  });

  document.getElementById('backMobile').addEventListener('click', () => {
    closeChat();
    document.getElementById('app').classList.remove('chat-open');
  });

  // ===== CARREGAR LISTA DE MATCHES =====
  async function loadMatchList() {
    try {
      const res = await fetch(`/matches/${userId}`, { headers: authHeaders });
      if (res.status === 401 || res.status === 403) {
        localStorage.removeItem('token');
        localStorage.removeItem('userId');
        window.location.href = '/index.html';
        return;
      }
      const matches = await res.json();
      renderMatchList(matches);
    } catch (err) {
      console.error(err);
    }
  }

  function renderMatchList(matches) {
    const list = document.getElementById('matchList');
    if (!matches.length) {
      list.innerHTML = `<div class="no-matches"><div class="icon">💫</div><p>Nenhum match ainda.<br>Continue curtindo!</p></div>`;
      return;
    }

    list.innerHTML = matches.map(m => `
      <div class="match-item ${m._id === currentChatUserId ? 'active' : ''}" data-id="${m._id}" data-name="${m.name}" data-photo="${m.photo || ''}">
        ${m.photo
          ? `<img class="match-avatar" src="${m.photo}" alt="${m.name}" onerror="this.outerHTML='<div class=\\'match-avatar\\'>👤</div>'">`
          : `<div class="match-avatar">👤</div>`
        }
        <div class="match-info">
          <p class="match-name">${m.name}</p>
          <p class="match-preview">${m.lastMessage || 'Diga olá! 👋'}</p>
        </div>
        ${m.unreadCount > 0 ? `<span class="unread-badge">${m.unreadCount}</span>` : ''}
      </div>
    `).join('');

    list.querySelectorAll('.match-item').forEach(item => {
      item.addEventListener('click', () => {
        const id = item.dataset.id;
        const name = item.dataset.name;
        const photo = item.dataset.photo;
        openChat(id, name, photo);
        document.getElementById('app').classList.add('chat-open');
      });
    });
  }

  // ===== ABRIR CONVERSA =====
  async function openChat(otherUserId, name, photo) {
    currentChatUserId = otherUserId;
    currentChatName = name;
    currentChatPhoto = photo;

    // UI
    document.getElementById('chatPlaceholder').style.display = 'none';
    document.getElementById('chatHeader').classList.add('show');
    document.getElementById('chatInputArea').classList.add('show');
    document.getElementById('chatHeaderName').textContent = name;

    const avatarEl = document.getElementById('chatHeaderAvatar');
    if (photo) {
      avatarEl.outerHTML = `<img class="chat-header-avatar" id="chatHeaderAvatar" src="${photo}" alt="${name}" onerror="this.outerHTML='<div class=\\'chat-header-avatar\\' id=\\'chatHeaderAvatar\\'>👤</div>'">`;
    } else {
      avatarEl.textContent = '👤';
    }

    // Entra na sala do socket
    socket.emit('join_conversation', { otherUserId });

    // Marca como ativo na lista
    document.querySelectorAll('.match-item').forEach(i => i.classList.remove('active'));
    document.querySelector(`.match-item[data-id="${otherUserId}"]`)?.classList.add('active');

    // Carrega mensagens
    await loadMessages(otherUserId);
    loadMatchList(); // atualiza badges de não lido
  }

  function closeChat() {
    currentChatUserId = null;
    document.getElementById('chatPlaceholder').style.display = 'flex';
    document.getElementById('chatHeader').classList.remove('show');
    document.getElementById('chatInputArea').classList.remove('show');
    document.getElementById('messagesContainer').innerHTML = '';
    document.querySelectorAll('.match-item').forEach(i => i.classList.remove('active'));
  }

  // ===== CARREGAR MENSAGENS =====
  async function loadMessages(otherUserId) {
    const container = document.getElementById('messagesContainer');
    container.innerHTML = '';

    try {
      const res = await fetch(`/messages/${otherUserId}`, { headers: authHeaders });
      if (!res.ok) return;
      const messages = await res.json();

      let lastDate = null;
      messages.forEach(msg => {
        const d = new Date(msg.createdAt);
        const dateStr = d.toLocaleDateString('pt-BR', { day:'2-digit', month:'long' });
        if (dateStr !== lastDate) {
          const div = document.createElement('div');
          div.className = 'msg-date-divider';
          div.textContent = dateStr;
          container.appendChild(div);
          lastDate = dateStr;
        }
        appendMessage(msg, msg.senderId === userId);
      });

      scrollToBottom();
    } catch (err) { console.error(err); }
  }

  // ===== RENDERIZAR MENSAGEM =====
  function appendMessage(msg, isMe) {
    const container = document.getElementById('messagesContainer');
    const row = document.createElement('div');
    row.className = `msg-row ${isMe ? 'me' : 'them'}`;

    const time = new Date(msg.createdAt).toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });

    const avatarHtml = isMe
      ? (myPhoto ? `<img class="msg-avatar" src="${myPhoto}">` : `<div class="msg-avatar">👤</div>`)
      : (currentChatPhoto ? `<img class="msg-avatar" src="${currentChatPhoto}">` : `<div class="msg-avatar">👤</div>`);

    row.innerHTML = `
      ${avatarHtml}
      <div>
        <div class="bubble">${escapeHtml(msg.text)}</div>
        <div class="msg-time">${time}</div>
      </div>
    `;

    container.appendChild(row);
  }

  function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function scrollToBottom() {
    const c = document.getElementById('messagesContainer');
    c.scrollTop = c.scrollHeight;
  }

  // ===== ENVIAR MENSAGEM =====
  const msgInput = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');

  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || !currentChatUserId) return;
    socket.emit('send_message', { receiverId: currentChatUserId, text });
    msgInput.value = '';
    msgInput.style.height = 'auto';
  }

  sendBtn.addEventListener('click', sendMessage);

  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Auto-resize textarea
  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
  });

  // ===== DELETAR CONVERSA =====
  const deleteModal = document.getElementById('deleteModal');

  document.getElementById('deleteBtn').addEventListener('click', () => {
    deleteModal.classList.add('show');
  });

  document.getElementById('cancelDelete').addEventListener('click', () => {
    deleteModal.classList.remove('show');
  });

  document.getElementById('confirmDelete').addEventListener('click', async () => {
    if (!currentChatUserId) return;
    deleteModal.classList.remove('show');

    try {
      const res = await fetch(`/conversation/${currentChatUserId}`, {
        method: 'DELETE',
        headers: authHeaders,
      });

      if (res.ok) {
        showToast('🗑 Conversa excluída para os dois.');
        closeChat();
        document.getElementById('app').classList.remove('chat-open');
        loadMatchList();
      }
    } catch (err) { console.error(err); }
  });

  // Fecha modal clicando fora
  deleteModal.addEventListener('click', (e) => {
    if (e.target === deleteModal) deleteModal.classList.remove('show');
  });

  // ===== TOAST =====
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // ===== INIT =====
  loadMatchList();
</script>
</body>
</html>
